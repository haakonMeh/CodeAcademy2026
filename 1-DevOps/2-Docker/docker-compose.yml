services:
  app:
    build:
      context: ../idempotweet
      dockerfile: ../2-Docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://codeacademy:codeacademy@postgres:5432/codeacademy
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=codeacademy
      - POSTGRES_PASSWORD=codeacademy
      - POSTGRES_DB=codeacademy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeacademy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
